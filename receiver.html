<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>Armillaria — Receiver</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: #000;
      color: #fff;
      font-family: Georgia, serif;
      height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      overflow: hidden;
    }

    #message {
      font-size: 10vw;
      text-align: center;
      padding: 2vw;
      line-height: 1.2;
      word-break: break-word;
      transition: opacity 0.15s ease;
    }

    #from {
      font-size: 1.8vw;
      font-family: monospace;
      color: #333;
      text-align: center;
      margin-top: 1em;
      transition: opacity 0.15s ease;
    }

    #status {
      position: fixed;
      bottom: 1em;
      right: 1em;
      font-size: 0.75em;
      font-family: monospace;
      color: #444;
    }

    #name-label {
      position: fixed;
      top: 1em;
      left: 1em;
      font-size: 0.75em;
      font-family: monospace;
      color: #333;
    }
  </style>
</head>
<body>

  <div id="message"></div>
  <div id="from"></div>
  <div id="status">connecting…</div>
  <div id="name-label"></div>

  <script>
    const params = new URLSearchParams(window.location.search);
    const myName = params.get("name") || "receiver";

    document.getElementById("name-label").textContent = myName;
    document.title = `Armillaria — ${myName}`;

    const WS_URL = `ws://${window.location.hostname}:8765`;
    const messageEl = document.getElementById("message");
    const fromEl = document.getElementById("from");
    const statusEl = document.getElementById("status");

    function connect() {
      const ws = new WebSocket(WS_URL);

      ws.onopen = () => {
        ws.send(JSON.stringify({ role: "receiver", name: myName }));
        statusEl.textContent = "● connected";
        statusEl.style.color = "#1a1a1a";
      };

      ws.onmessage = (event) => {
        let text, from;
        try {
          const data = JSON.parse(event.data);
          text = data.text.trim();
          from = data.from || "";
        } catch {
          text = event.data.trim();
          from = "";
        }

        // Selective routing: check for "Name: instruction" pattern
        const match = text.match(/^(\w[\w\s]*?):\s*(.+)$/);
        if (match) {
          const target = match[1].trim().toLowerCase();
          const instruction = match[2].trim();
          if (target === myName.toLowerCase()) {
            show(instruction, from);
          }
        } else {
          show(text, from);
        }
      };

      ws.onclose = () => {
        statusEl.textContent = "disconnected — retrying…";
        statusEl.style.color = "#552222";
        setTimeout(connect, 2000);
      };

      ws.onerror = () => ws.close();
    }

    function show(text, from) {
      messageEl.style.opacity = 0;
      fromEl.style.opacity = 0;
      setTimeout(() => {
        messageEl.textContent = text;
        fromEl.textContent = from;
        messageEl.style.opacity = 1;
        fromEl.style.opacity = 1;
      }, 150);
    }

    connect();
  </script>
</body>
</html>
