<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <title>Stroma</title>
  <script src="bg.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: #000;
      color: #fff;
      font-family: Georgia, serif;
      height: 100vh; height: 100dvh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    /* ── incoming messages ── */
    #stage {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 4vw;
      gap: 2em;
      overflow: hidden;
    }

    .msg {
      text-align: center;
      transition: opacity 0.3s ease;
      width: 100%;
    }

    .msg.latest {
      opacity: 1;
    }

    .msg.older {
      opacity: 0.18;
    }

    .msg .text {
      font-size: clamp(1.8rem, 9vw, 9rem);
      line-height: 1.15;
      word-break: break-word;
    }

    .msg .sender {
      font-size: clamp(0.7rem, 1.4vw, 1.2rem);
      font-family: monospace;
      color: #444;
      margin-top: 0.4em;
      letter-spacing: 0.05em;
    }

    /* ── input area ── */
    #composer {
      padding: 1.2em 2em;
      padding-bottom: max(1.2em, env(safe-area-inset-bottom));
      border-top: 1px solid #111;
      display: flex;
      align-items: center;
      gap: 1em;
    }

    #name-label {
      font-family: monospace;
      font-size: 0.75em;
      color: #333;
      white-space: nowrap;
    }

    #input {
      flex: 1;
      background: transparent;
      border: none;
      border-bottom: 1px solid #222;
      color: #888;
      font-family: monospace;
      font-size: 0.9em;
      outline: none;
      padding: 0.2em 0;
      caret-color: #555;
    }

    #input:focus {
      border-bottom-color: #444;
      color: #ccc;
    }

    #status {
      font-family: monospace;
      font-size: 0.65em;
      color: #222;
      white-space: nowrap;
    }

    #prompt {
      position: fixed;
      inset: 0;
      background: #000;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 1.5em;
      z-index: 10;
    }

    #prompt label {
      font-family: monospace;
      font-size: 0.85em;
      color: #444;
      letter-spacing: 0.1em;
      text-transform: uppercase;
    }

    #name-input {
      font-size: clamp(1.2rem, 2.5vw, 2rem);
      font-family: monospace;
      background: transparent;
      border: none;
      border-bottom: 1px solid #333;
      color: #fff;
      width: min(40vw, 320px);
      text-align: center;
      outline: none;
      padding: 0.3em 0;
      caret-color: #fff;
      -webkit-appearance: none;
    }

    #name-input:focus {
      border-bottom-color: #666;
    }

    canvas#bg {
      position: fixed;
      top: 0; left: 0;
      width: 100%; height: 100%;
      z-index: 0;
      pointer-events: none;
    }

    #stage, #composer, #prompt {
      position: relative;
      z-index: 1;
    }

    #roster {
      position: fixed;
      bottom: 4em;
      left: 2em;
      display: flex;
      flex-direction: column;
      gap: 0.4em;
      z-index: 1;
    }

    .roster-name {
      font-size: 0.65em;
      font-family: monospace;
      color: #1e1e1e;
      cursor: pointer;
      transition: color 0.15s;
      user-select: none;
    }

    .roster-name:hover {
      color: #555;
    }
  </style>
</head>
<body>

  <canvas id="bg"></canvas>

  <div id="prompt">
    <label>your name</label>
    <input id="name-input" type="text" autocomplete="off" spellcheck="false" placeholder="…" />
  </div>

  <div id="roster"></div>

  <div id="stage"></div>

  <div id="composer">
    <span id="name-label"></span>
    <input id="input" type="text" autocomplete="off" autocorrect="off"
           spellcheck="false" placeholder="…" />
    <span id="status">connecting…</span>
  </div>

  <script>
    const WS_URL = `ws://${window.location.hostname}:8765`;
    const promptEl = document.getElementById("prompt");
    const nameInputEl = document.getElementById("name-input");
    const stageEl = document.getElementById("stage");
    const inputEl = document.getElementById("input");
    const statusEl = document.getElementById("status");
    const nameLabelEl = document.getElementById("name-label");
    const rosterEl = document.getElementById("roster");

    const HISTORY = 3;
    let messages = [];
    let myName, ws;

    // URL param still works as a shortcut
    const params = new URLSearchParams(window.location.search);
    const presetName = params.get("name");
    if (presetName) {
      launch(presetName);
    } else {
      nameInputEl.value = localStorage.getItem("stroma-name") || "";
      nameInputEl.focus();
      nameInputEl.addEventListener("keydown", (e) => {
        if (e.key === "Enter") {
          const n = nameInputEl.value.trim();
          if (n) launch(n);
        }
      });
    }

    function launch(name) {
      myName = name;
      localStorage.setItem("stroma-name", myName);
      document.title = `Stroma — ${myName}`;
      nameLabelEl.textContent = myName;
      promptEl.style.display = "none";
      connect();
      inputEl.focus();
    }

    function renderStage() {
      stageEl.innerHTML = "";
      const visible = messages.slice(-HISTORY);
      visible.forEach((msg, i) => {
        const div = document.createElement("div");
        div.className = "msg " + (i === visible.length - 1 ? "latest" : "older");

        const textEl = document.createElement("div");
        textEl.className = "text";
        textEl.textContent = msg.text;

        const senderEl = document.createElement("div");
        senderEl.className = "sender";
        senderEl.textContent = msg.from;

        div.appendChild(textEl);
        div.appendChild(senderEl);
        stageEl.appendChild(div);
      });
    }

    function connect() {
      ws = new WebSocket(WS_URL);

      ws.onopen = () => {
        ws.send(JSON.stringify({ name: myName }));
        statusEl.textContent = "●";
        statusEl.style.color = "#1d3a1d";
      };

      ws.onmessage = (event) => {
        try {
          const data = JSON.parse(event.data);
          if (data.type === "roster") {
            renderRoster(data.names);
            return;
          }
          messages.push({ text: data.text, from: data.from });
          renderStage();
        } catch {}
      };

      ws.onclose = () => {
        statusEl.textContent = "○";
        statusEl.style.color = "#552222";
        rosterEl.innerHTML = "";
        setTimeout(connect, 2000);
      };

      ws.onerror = () => ws.close();
    }

    function renderRoster(names) {
      rosterEl.innerHTML = "";
      names.filter(n => n !== myName).forEach(name => {
        const el = document.createElement("div");
        el.className = "roster-name";
        el.textContent = name;
        el.addEventListener("click", () => {
          inputEl.value = `${name}: `;
          inputEl.focus();
        });
        rosterEl.appendChild(el);
      });
    }

    inputEl.addEventListener("keydown", (e) => {
      if (e.key === "Enter") {
        const text = inputEl.value.trim();
        if (!text || !ws || ws.readyState !== WebSocket.OPEN) return;
        ws.send(text);
        inputEl.value = "";
      }
    });

    initBg('Stroma');
  </script>
</body>
</html>
